<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Island Browser Compatibility Test</title>
<style>
  body { font-family: sans-serif; background: #111; color: #f0ede8; padding: 2rem; }
  h1 { color: #D4A843; }
  .test { display: flex; justify-content: space-between; padding: 0.5rem 1rem;
          margin: 0.4rem 0; border-radius: 6px; background: #1e1e1e; max-width: 600px; }
  .pass { border-left: 4px solid #4CAF82; }
  .fail { border-left: 4px solid #E05555; }
  .warn { border-left: 4px solid #D4A843; }
  .badge { font-weight: bold; }
  .pass .badge { color: #4CAF82; }
  .fail .badge { color: #E05555; }
  .warn .badge { color: #D4A843; }
  #summary { margin-top: 1.5rem; font-size: 1.1rem; max-width: 600px; }
  code { background: #2a2a2a; padding: 2px 6px; border-radius: 3px; font-size: 0.85em; }
</style>
</head>
<body>
<h1>Night Companion — Island Browser Compatibility Test</h1>
<p style="color:#888">Open this file via <code>file://</code> in Island. All items should be <strong style="color:#4CAF82">PASS</strong> except the two <strong style="color:#D4A843">WARN</strong> items which need manual verification.</p>
<div id="results"></div>
<div id="summary"></div>

<script>
  const results = [];

  function test(name, fn) {
    try {
      const result = fn();
      results.push({ name, status: result === 'warn' ? 'warn' : 'pass',
        note: result === 'warn' ? 'check manually' : 'OK' });
    } catch(e) {
      results.push({ name, status: 'fail', note: e.message });
    }
  }

  // 1. Protocol check — must be file://
  test('Opened via file:// protocol', () => {
    if (window.location.protocol !== 'file:')
      throw new Error('Protocol is ' + window.location.protocol + ' — must be openend as a local file');
  });

  // 2. Inline script executed (this very script proves it)
  test('Inline &lt;script&gt; execution allowed', () => true);

  // 3. localStorage read/write
  test('localStorage read/write', () => {
    localStorage.setItem('_compatTest', 'hello');
    const v = localStorage.getItem('_compatTest');
    localStorage.removeItem('_compatTest');
    if (v !== 'hello') throw new Error('value mismatch — localStorage may be blocked');
  });

  // 4. CSS custom properties
  test('CSS custom properties (--variables)', () => {
    const el = document.createElement('div');
    document.body.appendChild(el);
    el.style.setProperty('--test-var', '42px');
    const val = el.style.getPropertyValue('--test-var');
    document.body.removeChild(el);
    if (!val) throw new Error('CSS custom properties not supported');
  });

  // 5. Canvas API (image resize for Night Log photos)
  test('Canvas API (photo resize)', () => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    if (!ctx) throw new Error('canvas.getContext failed');
  });

  // 6. FileReader API (logo upload, photo preview)
  test('FileReader API', () => {
    if (typeof FileReader === 'undefined') throw new Error('FileReader not available');
  });

  // 7. File picker input
  test('File picker (<input type="file">)', () => {
    const input = document.createElement('input');
    input.type = 'file';
    if (input.type !== 'file') throw new Error('file input not supported');
  });

  // 8. Blob + URL.createObjectURL (JSON export)
  test('Blob + URL.createObjectURL (JSON export)', () => {
    const blob = new Blob(['{"test":true}'], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    URL.revokeObjectURL(url);
    if (!url.startsWith('blob:')) throw new Error('createObjectURL failed');
  });

  // 9. <a download> attribute (file save fallback)
  test('<a download> attribute supported', () => {
    const a = document.createElement('a');
    if (typeof a.download === 'undefined') throw new Error('download attribute not supported');
  });

  // 10. CSS animations (keyframes — pulse indicators)
  test('CSS animations / Element.animate()', () => {
    const el = document.createElement('div');
    if (typeof el.animate !== 'function') throw new Error('Web Animations API not supported');
  });

  // 11. document.documentElement.style.setProperty (brand colour override)
  test('CSS variable override via JS (brand colour)', () => {
    document.documentElement.style.setProperty('--compat-test', '#fff');
    const val = document.documentElement.style.getPropertyValue('--compat-test');
    document.documentElement.style.removeProperty('--compat-test');
    if (!val) throw new Error('setProperty on :root failed');
  });

  // 12. File System Access API (nice-to-have — fallback <a download> exists if missing)
  test('File System Access API (optional — fallback exists)', () => {
    if (!window.showSaveFilePicker) return 'warn';
  });

  // 13. Google Fonts CDN reachability — manual check
  test('Google Fonts CDN (manual check — needs internet on first load)', () => {
    return 'warn';
  });

  // 14. getUserMedia blocked on file:// — PASS means camera correctly unavailable
  test('getUserMedia blocked on file:// (file picker used instead — expected)', () => {
    if (window.location.protocol === 'file:') {
      // Correct behaviour — camera blocked, file picker is the intentional approach
      return true;
    }
    // If not file:// this test is not applicable
    return 'warn';
  });

  // Render results
  const container = document.getElementById('results');
  results.forEach(r => {
    const div = document.createElement('div');
    div.className = 'test ' + r.status;
    div.innerHTML = `<span>${r.name}</span><span class="badge">${r.status.toUpperCase()} &mdash; ${r.note}</span>`;
    container.appendChild(div);
  });

  const passed = results.filter(r => r.status === 'pass').length;
  const warned = results.filter(r => r.status === 'warn').length;
  const failed = results.filter(r => r.status === 'fail').length;
  document.getElementById('summary').innerHTML =
    `<hr style="border-color:#2a2a2a">
     <strong style="color:${failed ? '#E05555' : '#4CAF82'}">
       ${passed} passed &nbsp;&bull;&nbsp; ${warned} manual checks &nbsp;&bull;&nbsp; ${failed} failed
     </strong><br><br>
     <small style="color:#888">
       ${failed === 0
         ? '✅ All critical checks passed. Safe to proceed with the build.'
         : '❌ One or more critical checks failed. Island IT policy may be blocking file:// access — discuss with your IT administrator before building.'}
       <br>WARN items: File System Access API falling back to &lt;a download&gt; is fine.
       Google Fonts requires internet on first load only.
     </small>`;
</script>
</body>
</html>
