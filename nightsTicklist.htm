
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Front Office Nights Checklist</title>
	<link rel="icon" id="logoFavicon" href="NightsLogo.ico"/>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
		integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
		crossorigin="anonymous" />
	<!-- PDF library will be loaded on demand -->
	<style>
		body {
			font-family: candara, verdana, sans-serif;
			padding: 20px;
		}

		.checklist-item {
			margin-bottom: 10px;
			padding: 10px;
			border: 1px solid #ddd;
			border-radius: 5px;
			background-color: #f9f9f9;
		}


		.required-before-continue {
			background-color: #fff3cd;
			border-color: #ffeeba;
		}

		.completed {
			text-decoration: line-through;
			color: #777;
		}

		.disabled {
			opacity: 0.5;
			pointer-events: none;
		}

		.subtitle {
			font-size: 0.8em;
			color: #AAA;
		}

		.logo {
			width: 150px;
			height: auto;
			vertical-align: middle;
			margin-right: 10px;
		}

		.header-task {
			font-weight: bold;
			font-size: 1.2em;
			margin-bottom: 5px;
			padding: 5px;
			border-bottom: 2px solid #eee;
		}

		/* Validation Styles */
		.is-invalid {
			border-color: #dc3545 !important;
			box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25) !important;
		}

		.save-indicator {
			position: fixed;
			top: 20px;
			right: 20px;
			background: #28a745;
			color: white;
			padding: 8px 16px;
			border-radius: 4px;
			font-size: 14px;
			z-index: 1000;
			opacity: 0;
			transition: opacity 0.3s ease;
		}

		.save-indicator.show {
			opacity: 1;
		}

		.save-indicator.saving {
			background: #ffc107;
			color: #212529;
		}

		/* Mobile Responsiveness */
		@media (max-width: 768px) {
			body {
				padding: 10px;
			}

			.container {
				padding: 15px;
			}

			.btn {
				padding: 12px 20px;
				font-size: 16px;
				margin-bottom: 10px;
				width: 100%;
			}

			.form-control {
				font-size: 16px;
				padding: 12px;
			}

			.checklist-item {
				padding: 15px;
				margin-bottom: 15px;
			}

			.logo {
				width: 150px;
				margin-right: 8px;
			}

			h1 {
				font-size: 1.5rem;
				margin-bottom: 20px;
			}

			.header-task {
				font-size: 1.1em;
				padding: 8px;
			}
		}

		.handover-page {
			box-sizing: border-box;
			width: 100%;
			max-width: 8.5in;
			min-height: 9.5in;
			margin: 40px auto 0;
			padding: 0.35in 0.35in 0.3in;
			border: 1px solid #ddd;
			border-radius: 6px;
			background: #fff;
			color: inherit;
			display: flex;
			flex-direction: column;
			gap: 8px;
		}

		.handover-header {
			display: grid;
			grid-template-columns: 120px 1fr auto;
			align-items: center;
			gap: 12px;
			padding-bottom: 6px;
			border-bottom: 2px solid #eee;
		}

		.handover-logo {
			width: 110px;
			height: auto;
		}

		.handover-title {
			font-size: 1.25rem;
			font-weight: 700;
			letter-spacing: 0.2px;
			text-transform: none;
			text-align: center;
		}

		.handover-date {
			display: flex;
			align-items: center;
			gap: 8px;
			font-size: 0.9rem;
			font-weight: 600;
		}

		.handover-date-value {
			display: inline-flex;
			align-items: center;
			min-width: 140px;
			padding: 4px 8px;
			border: 0px solid #ddd;
			border-radius: 4px;
			background: #fff;
			color: inherit;
			font-size: 0.9rem;
            font-weight: 500;
		}

		.handover-staff-value {
			display: inline-flex;
			align-items: center;
			min-width: 160px;
			padding: 4px 8px;
			border: 0px solid #ddd;
			border-radius: 4px;
			background: #fff;
			color: inherit;
			font-size: 0.9rem;
            font-weight: 500;
		}

		.handover-section {
			border: 1px solid #ddd;
			border-radius: 5px;
			display: flex;
			flex-direction: column;
			padding: 8px;
			gap: 6px;
			background-color: #f9f9f9;
		}

		.handover-section-title {
			font-weight: 700;
			font-size: 0.95rem;
			text-align: center;
			text-transform: none;
		}

		.handover-section textarea {
			border: 1px solid #ddd;
			border-radius: 4px;
			resize: none;
			padding: 8px;
			font-size: 0.9rem;
			font-family: inherit;
			line-height: 1.4;
			width: 100%;
			flex: 1;
			background: #fff;
			color: inherit;
		}

		.handover-actions , .ticklist-actions{
			display: flex;
			gap: 12px;
			justify-content: flex-end;
			flex-wrap: wrap;
		}

		.handover-notes {
			flex: 1 1 auto;
			min-height: 3.8in;
		}

		.handover-breakfast {
			min-height: 1in;
		}

		.handover-taxis {
			min-height: 0.9in;
		}

		.handover-wakeup {
			min-height: 1in;
		}

		@media print {
			.handover-page {
				page-break-before: always;
				margin: 0 auto;
				min-height: 9.5in;
				max-height: 9.5in;
				overflow: hidden;
			}
		}

		@media (max-width: 480px) {
			body {
				padding: 5px;
			}

			.container {
				padding: 10px;
			}

			h1 {
				font-size: 1.3rem;
			}

			.checklist-item {
				padding: 12px;
			}
		}

		body {
			background-color: #fff;
			color: #000;
		}

		.checklist-item {
			border-color: #ddd;
			background-color: #f9f9f9;
		}

		@media (prefers-color-scheme: dark) {
			body {
				background-color: #333;
				color: #fff;
			}

			.checklist-item {
				border-color: #555;
				background-color: #444;
				color: #eee;
			}


			.required-before-continue {
				background-color: #665533;
				border-color: #776644;
				color: #fff;
			}

			.handover-page {
				border-color: #444;
				background-color: #333;
			}

			.handover-header {
				border-bottom-color: #555;
			}

			.handover-section {
				border-color: #444;
				background-color: #444;
			}

			.handover-section textarea,
			.handover-date-value,
			.handover-staff-value {
				border-color: #555;
				background-color: #333;
				color: #eee;
			}
		}

		@media print {
			body {
				font-family: candara, Arial, sans-serif;
				padding: 0;
				margin: 0;
				color: #000;
				background: #fff;
				font-size: 12pt;
				line-height: 1.2;
			}

			body > *:not(.container) {
				display: none !important;
			}

			body.print-handover > * {
				display: none !important;
			}

			body.print-handover .handover-page {
				display: block !important;
				visibility: visible !important;
				margin: 0 auto;
				max-width: 100%;
			}

			body.print-handover .handover-actions {
				display: none !important;
			}

			.container {
				position: relative;
				padding: 5px;
				margin: 0;
				border: none;
				width: auto;
				max-width: 100%;
				visibility: visible !important;
				margin-top: 0px;
				padding-top: 0px;
			}

			#progressSection,
			#generatePdfButton,
			#clearDataButton,
			#saveIndicator,
			.btn,
			button {
				display: none !important;
			}

			h1 {
				font-size: 18pt;
				margin-bottom: 15px;
				text-align: center;
				border-bottom: 2px solid #000;
				padding-bottom: 10px;
			}

			.logo {
				width: 150px;
				height: auto;
			}

			.mb-3 {
				margin-bottom: 8px;
				display: block;
				visibility: visible !important;
				page-break-inside: avoid;
			}

			.form-label {
				display: inline-block;
				font-weight: bold;
				margin-bottom: 2px;
				margin-right: 10px;
				min-width: 120px;
				visibility: visible !important;
			}

			.form-label:after {
				content: attr(data-print-value);
				font-weight: normal;
				font-style: italic;
				margin-left: 5px;
			}

			.form-control,
			input[type="text"],
			input[type="date"],
			input[type="checkbox"] {
				display: none !important;
			}

			#checklist {
				margin-top: 5px;
				page-break-inside: auto;
			}

			.checklist-item {
				border: 1px solid #000;
				background-color: #fff;
				color: #000;
				padding: 8px;
				margin-bottom: 3px;
				page-break-inside: avoid;
				visibility: visible !important;
				position: relative;
				font-size: smaller;
			}

			.checklist-item.completed {
				background-color: #f8f9fa !important;
				border-left: 4px solid #28a745 !important;
				text-decoration: none !important;
				color: #000 !important;
			}

			.checklist-item.completed label:before {
				content: "✓ ";
				font-weight: bold;
				color: #28a745;
				margin-right: 5px;
				display: inline;
			}

			.checklist-item label {
				text-decoration: none !important;
				color: #000 !important;
				display: block !important;
				font-weight: normal;
				margin: 0;
				padding: 0;
				cursor: default;
			}

			.subtitle {
				display: none;
				font-size: 10pt;
				color: #666;
				font-style: italic;
				margin-top: 2px;
				visibility: none !important;
			}

			.required-before-continue {
				border-left: 4px solid #ff6b35;
				background-color: #fff8f0;
			}

			.header-task {
				page-break-after: avoid;
				font-size: 14pt;
				border-bottom: 1px solid #000;
				margin-bottom: 5px;
				margin-top: 5px;
				padding-bottom: 3px;
				font-weight: bold;
				visibility: visible !important;
				background-color: #f5f5f5;
				text-align: center;
			}

			.header-task:first-of-type {
				margin-top: 0;
			}

			@page {
				margin: 0.75in;
				size: a4;
			}
		}
	</style>
</head>

<body>
	<div class="container">
		<h1><img id="logoImage" src="" alt="Logo" class="logo">Front Office Nights Checklist</h1>
		<div class="form-group d-flex gap-3 w-100 justify-content-between row">
			<div class="mb-3 col-3">
				<label for="shiftDate" class="form-label fw-semibold">Date:</label>
				<input type="date" class="form-control" id="shiftDate" required>
			</div>
			<div class="mb-3 col-8">
				<label for="staffName" class="form-label fw-semibold">Staff:</label>
				<input type="text" class="form-control" id="staffName" placeholder="Enter staff names" required>
			</div>
		</div>

        <!--<div class="ticklist-actions" style="justify-content: space-around;">
			<button id="generatePdfButton" class="btn btn-primary">Generate PDF</button>
            <button id="printButton" class="btn btn-info">Print Checklist</button>
            <button id="clearDataButton" class="btn btn-secondary">Clear Data</button>
		</div>-->

		<!-- Progress Indicator -->
		<div class="mb-3" id="progressSection" style="display: none;">
			<label class="form-label fw-semibold">Progress:</label>
			<div class="progress mb-2">
				<div class="progress-bar" role="progressbar" id="progressBar" style="width: 0%"></div>
			</div>
			<small class="text-white-50" id="progressText">0 of 0 tasks completed</small>
		</div>

		<div id="checklist"></div>
		<div class="ticklist-actions" style="justify-content: space-around;">
			<button id="generatePdfButton" class="btn btn-primary">Generate PDF</button>
            <button id="printButton" class="btn btn-info">Print Checklist</button>
            <button id="clearDataButton" class="btn btn-secondary">Clear Data</button>
		</div>
	</div>

	<section class="handover-page"  class="container" aria-labelledby="handoverTitle">
		<div class="handover-header">
			<img id="handoverLogo" class="handover-logo" alt="Lingfield Park logo">
			<div id="handoverTitle" class="handover-title">Front Office Nights Handover</div>
			<div class="handover-date">
				<div class="d-flex flex-column gap-1">
					<div class="d-flex align-items-center gap-2">
						<span>Date:</span>
						<span id="handoverDateDisplay" class="handover-date-value" aria-live="polite"></span>
					</div>
					<div class="d-flex align-items-center gap-2">
						<span>Staff:</span>
						<span id="handoverStaffDisplay" class="handover-staff-value" aria-live="polite"></span>
					</div>
				</div>
			</div>
		</div>

		<div class="handover-section handover-notes">
			<div class="handover-section-title">Handover Notes</div>
			<label for="handoverNotes" class="visually-hidden">Handover Notes</label>
			<textarea id="handoverNotes" name="handoverNotes" aria-label="Handover notes"></textarea>
		</div>

		<div class="handover-section handover-breakfast">
			<div class="handover-section-title">Breakfast Bags</div>
			<label for="breakfastBags" class="visually-hidden">Breakfast Bags</label>
			<textarea id="breakfastBags" name="breakfastBags" aria-label="Breakfast bags"></textarea>
		</div>

		<div class="handover-section handover-taxis">
			<div class="handover-section-title">Taxis</div>
			<label for="taxis" class="visually-hidden">Taxis</label>
			<textarea id="taxis" name="taxis" aria-label="Taxis"></textarea>
		</div>

		<div class="handover-section handover-wakeup">
			<div class="handover-section-title">Wake-up Calls</div>
			<label for="wakeUpCalls" class="visually-hidden">Wake-up Calls</label>
			<textarea id="wakeUpCalls" name="wakeUpCalls" aria-label="Wake-up calls"></textarea>
		</div>

		<div class="handover-actions">
			<button id="handoverPdfButton" class="btn btn-primary">Generate PDF</button>
			<button id="handoverPrintButton" class="btn btn-info">Print Handover</button>
			<button id="handoverClearButton" class="btn btn-secondary">Clear Handover</button>
		</div>
	</section>

	<!-- Save Indicator -->
	<div id="saveIndicator" class="save-indicator">Saved ✓</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

		const DAY_INDEX = {
			monday: 1,
			tuesday: 2,
			wednesday: 3,
			thursday: 4,
			friday: 5,
			saturday: 6,
			sunday: 0
		};

		const DAY_LABEL = {
			0: 'Sun',
			1: 'Mon',
			2: 'Tue',
			3: 'Wed',
			4: 'Thu',
			5: 'Fri',
			6: 'Sat'
		};

		function normalizeDay(dayName) {
			if (!dayName) return null;
			const key = dayName.toLowerCase();
			return Object.prototype.hasOwnProperty.call(DAY_INDEX, key) ? DAY_INDEX[key] : null;
		}

		function parseDaysAndCleanText(taskText) {
			let cleaned = taskText.trim();
			let days = [];
			let lastNightOfMonth = false;

			const lastNightMatch = cleaned.match(/\blast\s+night\s+of\s+month\b/i);
			if (lastNightMatch) {
				lastNightOfMonth = true;
				cleaned = cleaned.replace(lastNightMatch[0], '').replace(/\s{2,}/g, ' ').trim();
			}

			const dualPrefix = cleaned.match(/^(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\s*(?:&|\/|and)\s*(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\s*[-–—]\s*/i);
			if (dualPrefix) {
				const dayA = normalizeDay(dualPrefix[1]);
				const dayB = normalizeDay(dualPrefix[2]);
				if (dayA !== null) days.push(dayA);
				if (dayB !== null) days.push(dayB);
				cleaned = cleaned.replace(dualPrefix[0], '').trim();
			}

			const nightPrefix = cleaned.match(/^(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\s+night\s*[-–—]*\s*/i);
			if (nightPrefix) {
				const day = normalizeDay(nightPrefix[1]);
				if (day !== null) days.push(day);
				cleaned = cleaned.replace(nightPrefix[0], '').trim();
			}

			const singlePrefix = cleaned.match(/^(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\s*[-–—]\s*/i);
			if (singlePrefix) {
				const day = normalizeDay(singlePrefix[1]);
				if (day !== null) days.push(day);
				cleaned = cleaned.replace(singlePrefix[0], '').trim();
			}

			const parenOnlyMatches = [...cleaned.matchAll(/\((mon|tue|wed|thu|fri|sat|sun)[a-z]*\s+only\)/ig)];
			if (parenOnlyMatches.length) {
				parenOnlyMatches.forEach(match => {
					const dayName = match[1];
					const day = normalizeDay(dayName
						.replace(/^mon$/i, 'monday')
						.replace(/^tue$/i, 'tuesday')
						.replace(/^wed$/i, 'wednesday')
						.replace(/^thu$/i, 'thursday')
						.replace(/^fri$/i, 'friday')
						.replace(/^sat$/i, 'saturday')
						.replace(/^sun$/i, 'sunday'));
					if (day !== null) days.push(day);
				});
				cleaned = cleaned.replace(/\((mon|tue|wed|thu|fri|sat|sun)[a-z]*\s+only\)/ig, '').replace(/\s{2,}/g, ' ').trim();
			}

			days = [...new Set(days)];
			return { cleaned, days, lastNightOfMonth };
		}

			function createChecklistItem(item) {
				const div = document.createElement('div');
				div.classList.add('checklist-item');

				if (item.type === TASK_TYPES.HEADER) {
					div.classList.add('header-task');
					div.textContent = item.text;
				} else {
					if (item.type === TASK_TYPES.REQUIRED_BEFORE_CONTINUE) {
						div.classList.add('required-before-continue');
					}

					let labelHTML = `<input type="checkbox" id="task-${item.id}" value="${item.id}"> ${item.text}`;
					if (item.subtitle) {
						const subtitleHtml = item.subtitle.replace(/\n+/g, '<br>');
						labelHTML += `<div class="subtitle">${subtitleHtml}</div>`;
					}

					const label = document.createElement('label');
					label.innerHTML = labelHTML;
					div.appendChild(label);

					const checkbox = div.querySelector('input[type="checkbox"]');
					checkbox.addEventListener('change', function () {
						completedTasks[item.id] = this.checked;
						updateItemStyle(item.id, this.checked);
						updateProgress();
						saveData();
					});
				}

				checklistDiv.appendChild(div);
				return div;
			}

			function updateItemStyle(itemId, isChecked) {
				const checkbox = checklistDiv.querySelector(`#task-${itemId}`);
				if (!checkbox) return;
				const div = checkbox.closest('.checklist-item');
				if (isChecked) {
					div.classList.add('completed');
				} else {
					div.classList.remove('completed');
				}
			}

			function updateProgress() {
				const nonHeaderTasks = currentTasks.filter(task => task.type !== TASK_TYPES.HEADER);
				const totalTasks = nonHeaderTasks.length;
				const completedCount = nonHeaderTasks.filter(task => completedTasks[task.id]).length;

				if (totalTasks > 0) {
					const percentage = Math.round((completedCount / totalTasks) * 100);

					const progressBar = document.getElementById('progressBar');
					const progressText = document.getElementById('progressText');
					const progressSection = document.getElementById('progressSection');

					progressBar.style.width = percentage + '%';
					progressBar.setAttribute('aria-valuenow', percentage);
					progressBar.textContent = `${percentage}%`;
					progressText.textContent = `${completedCount} of ${totalTasks} tasks completed (${percentage}%)`;

					progressSection.style.display = 'block';

					progressBar.className = 'progress-bar';
					if (percentage === 100) {
						progressBar.classList.add('bg-success');
					} else if (percentage >= 50) {
						progressBar.classList.add('bg-info');
					} else {
						progressBar.classList.add('bg-warning');
					}
				} else {
					document.getElementById('progressSection').style.display = 'none';
				}
			}

			function saveData() {

						saveIndicator.textContent = `Saved ✓ ${timeStr}`;

						setTimeout(() => {
							saveIndicator.classList.remove('show');

				} catch (e) {
					console.error('Error saving to localStorage', e);

			function validateTaskCompletion() {

				const incompleteRequired = requiredTasks.filter(task => !completedTasks[task.id]);

				if (incompleteRequired.length > 0) {
					const taskNames = incompleteRequired.map(task => task.text).join('\n• ');
					const proceed = confirm(
						`Warning: The following required tasks are not completed:\n\n• ${taskNames}\n\nDo you want to generate the PDF anyway?`

			// ===== PDF LIBRARY LAZY LOADING =====
			let pdfLibraryLoaded = false;

			async function loadPDFLibrary() {
				if (pdfLibraryLoaded || window.jspdf) {
					return true;
				}

				try {
					const script = document.createElement('script');
					script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';

					return new Promise((resolve, reject) => {
						script.onload = () => {
							pdfLibraryLoaded = true;
							resolve(true);
						};
						script.onerror = () => reject(new Error('Failed to load PDF library'));
						document.head.appendChild(script);
					});
				} catch (error) {
					console.error('Error loading PDF library:', error);
					return false;
				}
			}

			document.getElementById('generatePdfButton').addEventListener('click', async function () {
				const button = this;
				const originalText = button.textContent;

				try {
					if (!validateRequiredFields()) {
						return;
					}

					if (!validateTaskCompletion()) {
						return;
					}

					button.disabled = true;
					button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading PDF Library...';

					const loaded = await loadPDFLibrary();

					}

					button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating PDF...';

					const { jsPDF } = window.jspdf;
					const pdf = new jsPDF();

					pdf.setFont('helvetica', 'bold');
					pdf.setFontSize(18);
					pdf.setTextColor(0, 0, 0);
					pdf.text('Front Office Nights Checklist', 105, 20, { align: 'center' });

					let yOffset = 35;

					const fields = [
						{ label: 'Date', id: 'shiftDate' },

					];

					fields.forEach(field => {
						const element = document.getElementById(field.id);

						if (field.id === 'shiftDate' && value) {
							const date = new Date(value);
							value = date.toLocaleDateString();
						}
						if(cssClasses.contains('subtitle')){
						} else{							
						pdf.setFont('helvetica', 'bold');
						pdf.text(`${field.label}:`, 20, yOffset);
						pdf.setFont('helvetica', 'italic');
						pdf.text(value || 'Not specified', 60, yOffset);
						yOffset += 7;
						}
					});

					pdf.setLineWidth(0.3);
					pdf.line(20, yOffset, 190, yOffset);
					yOffset += 6;

					pdf.setFontSize(10);
					const boxX = 20;
					const boxWidth = 170;
					const textX = 26;
					const textMaxWidth = boxWidth - (textX - boxX) - 6;

					const wrapText = (input, maxWidth) => {
						const words = input.split(/\s+/).filter(Boolean);
						const lines = [];
						let current = '';

						const pushCurrent = () => {
							if (current) {
								lines.push(current);
								current = '';
							}
						};

						words.forEach(word => {
							const test = current ? `${current} ${word}` : word;
							if (pdf.getTextWidth(test) <= maxWidth) {
								current = test;
								return;
							}

							pushCurrent();
							if (pdf.getTextWidth(word) <= maxWidth) {
								current = word;
								return;
							}

							let chunk = '';
							for (const ch of word) {
								const testChunk = chunk + ch;
								if (pdf.getTextWidth(testChunk) <= maxWidth) {
									chunk = testChunk;
								} else {
									lines.push(chunk);
									chunk = ch;
								}
							}
							current = chunk;
						});

						pushCurrent();
						return lines.length ? lines : [''];
					};

					const checklistItems = document.querySelectorAll('.checklist-item');

					checklistItems.forEach(item => {
						let text = '';
						const isHeader = item.classList.contains('header-task');
						const isCompleted = item.classList.contains('completed');
						const isRequired = item.classList.contains('required-before-continue');

						if (isHeader) {
							if (yOffset > 270) {
								pdf.addPage();
								yOffset = 20;
							}

							pdf.setFont('helvetica', 'bold');
							pdf.setFontSize(12);
							pdf.setTextColor(0, 0, 0);
							text = item.textContent.trim();
							pdf.setFillColor(245, 245, 245);
							pdf.rect(20, yOffset - 5, 170, 8, 'F');
							pdf.text(text, 105, yOffset, { align: 'center' });
							yOffset += 8;
							pdf.setLineWidth(0.2);
							pdf.line(20, yOffset - 2, 190, yOffset - 2);
							yOffset += 4;
							return;
						}

						pdf.setFont('helvetica', 'normal');
						pdf.setFontSize(10);

						const label = item.querySelector('label');
						if (label) {
							let textContent = '';
							for (let node of label.childNodes) {
								if (node.nodeType === Node.TEXT_NODE) {
									textContent += node.textContent;
								}
							}
							text = textContent.trim();
						}

						//const subtitle = item.querySelector('.subtitle');
						const subtitle = "";
						const lineHeight = 5;
						//const subtitleLineHeight = 4;
						const subtitleLineHeight = 0;
						const paddingTop = 4;
						const paddingBottom = 4;

						pdf.setFont('helvetica', 'normal');
						pdf.setFontSize(10);
						const lines = wrapText(text, textMaxWidth);

						pdf.setFont('helvetica', 'italic');
						pdf.setFontSize(9);
						/*const subtitleLines = subtitle
							? wrapText(subtitle.textContent.trim(), textMaxWidth)
							: [];*/
						const subtitleLines = [];
						const textHeight = lines.length * lineHeight;
						//const subtitleHeight = subtitleLines.length ? (subtitleLines.length * subtitleLineHeight + 2) : 0;
						const subtitleHeight = 0;
						const boxHeight = paddingTop + textHeight + subtitleHeight + paddingBottom;
						const pageTop = 20;
						const pageBottom = 270;
						let boxTop = yOffset;
						if (boxTop + boxHeight > pageBottom) {
							pdf.addPage();
							boxTop = pageTop;
							yOffset = pageTop;
						}
						const textStartY = boxTop + paddingTop;

						pdf.setDrawColor(0, 0, 0);
						pdf.setLineWidth(0.3);
						pdf.rect(boxX, boxTop, boxWidth, boxHeight);

						if (isCompleted) {
							pdf.setFillColor(40, 167, 69);
							pdf.rect(boxX, boxTop, 3, boxHeight, 'F');
						} else if (isRequired) {
							pdf.setFillColor(255, 107, 53);
							pdf.rect(boxX, boxTop, 3, boxHeight, 'F');
						}

						if (isCompleted) {
							pdf.setFont('helvetica', 'bold');
							pdf.setFontSize(11);
							pdf.setTextColor(40, 167, 69);
							pdf.text('✓', boxX + boxWidth - 5, textStartY + 2);
						}

						pdf.setFont('helvetica', 'normal');
						pdf.setFontSize(10);
						pdf.setTextColor(0, 0, 0);
						lines.forEach((line, index) => {
							pdf.text(line, textX, textStartY + index * lineHeight);
						});

						if (subtitleLines.length) {
							pdf.setFont('helvetica', 'italic');
							pdf.setFontSize(9);
							pdf.setTextColor(100, 100, 100);
							subtitleLines.forEach((line, index) => {
								pdf.text(line, textX, textStartY + textHeight + 2 + index * subtitleLineHeight);
							});
						}

						yOffset = boxTop + boxHeight + 4;
					});

					const pageCount = pdf.internal.getNumberOfPages();
					for (let i = 1; i <= pageCount; i++) {
						pdf.setPage(i);
						pdf.setFont('helvetica', 'normal');
						pdf.setFontSize(8);
						pdf.setTextColor(128, 128, 128);

						const now = new Date();
						const footerText = `Generated: ${now.toLocaleString()} | Page ${i} of ${pageCount}`;
						pdf.text(footerText, 105, 290, { align: 'center' });
					}

					const staffName = document.getElementById('staffName').value || 'Unknown';
					const dateStr = new Date().toISOString().split('T')[0];
					const filename = `Front-Office-Nights-Checklist_${staffName.replace(/[^a-zA-Z0-9]/g, '-')}_${dateStr}.pdf`;

					pdf.save(filename);

				} catch (error) {
					console.error('Error generating PDF:', error);
					alert('Error generating PDF: ' + error.message);
				} finally {
					button.disabled = false;
					button.textContent = originalText;
				}
			});

					});

					const dateStr = new Date().toISOString().split('T')[0];
					const filename = `Front-Office-Nights-Handover_${dateStr}.pdf`;
					pdf.save(filename);
				} catch (error) {
					console.error('Error generating handover PDF:', error);
					alert('Error generating PDF: ' + error.message);
				} finally {
					button.disabled = false;
					button.textContent = originalText;
				}
			});

			document.getElementById('clearDataButton').addEventListener('click', function () {
				if (confirm('Are you sure you want to clear all data? This cannot be undone.')) {
					localStorage.removeItem('nightsChecklistData');
					location.reload();
				}
			});

			document.getElementById('staffName').addEventListener('input', function () {
				this.classList.remove('is-invalid');
				updatePrintValues();
				saveData();
			});

			['handoverNotes', 'breakfastBags', 'taxis', 'wakeUpCalls'].forEach((id) => {
				const field = document.getElementById(id);
				if (field) {
					field.addEventListener('input', saveHandoverData);
				}
			});

			document.getElementById('shiftDate').addEventListener('change', function () {
				this.classList.remove('is-invalid');
				updatePrintValues();
				buildChecklist();
				saveData();
			});

			function buildChecklist() {
				checklistDiv.innerHTML = '';
				const shiftDateValue = document.getElementById('shiftDate').value;
				const selectedDate = shiftDateValue ? new Date(shiftDateValue) : null;
				const selectedDay = selectedDate ? selectedDate.getDay() : null;
				const isLastDayOfMonth = selectedDate
					? selectedDate.getDate() === new Date(selectedDate.getFullYear(), selectedDate.getMonth() + 1, 0).getDate()
					: null;
				const visibleTasks = tasks
					.map(task => {
						if (task.type === TASK_TYPES.HEADER) return task;
						const isRequired = REQUIRED_OVERRIDES[task.id] === true;
						return {
							...task,
							type: isRequired ? TASK_TYPES.REQUIRED : TASK_TYPES.OPTIONAL
						};
					})
					.filter(task => {
						if (task.type === TASK_TYPES.HEADER) return true;
						if (task.lastNightOfMonth && selectedDate === null) return true;
						if (task.lastNightOfMonth && !isLastDayOfMonth) return false;
						if (!task.days || task.days.length === 0) return true;
						if (selectedDay === null) return true;
						return task.days.includes(selectedDay);
					});
				currentTasks = visibleTasks;
				visibleTasks.forEach(task => {
					const div = createChecklistItem(task);
					if (task.type !== TASK_TYPES.HEADER) {
						completedTasks[task.id] = completedTasks[task.id] || false;
						const checkbox = div.querySelector(`#task-${task.id}`);
						if (checkbox) {
							checkbox.checked = completedTasks[task.id];
						}
						updateItemStyle(task.id, completedTasks[task.id]);
					}
				});
				updateProgress();
				updatePrintValues();
			}

			// Initialize
			try {
				const storedData = localStorage.getItem('nightsChecklistData');
				if (storedData) {
					const data = JSON.parse(storedData);
					completedTasks = data.completedTasks || {};
					const staffField = document.getElementById('staffName');
					staffField.value = data.staffName || '';
					staffField.dispatchEvent(new Event('input'));
					const shiftDateField = document.getElementById('shiftDate');
					shiftDateField.value = data.shiftDate || '';
					shiftDateField.dispatchEvent(new Event('input'));
				}

				const storedHandover = localStorage.getItem('nightsHandoverData');
				if (storedHandover) {
					const handoverData = JSON.parse(storedHandover);
					const handoverNotes = document.getElementById('handoverNotes');
					const breakfastBags = document.getElementById('breakfastBags');
					const taxis = document.getElementById('taxis');
					const wakeUpCalls = document.getElementById('wakeUpCalls');
					if (handoverNotes) handoverNotes.value = handoverData.handoverNotes || '';
					if (breakfastBags) breakfastBags.value = handoverData.breakfastBags || '';
					if (taxis) taxis.value = handoverData.taxis || '';
					if (wakeUpCalls) wakeUpCalls.value = handoverData.wakeUpCalls || '';
				}
				buildChecklist();
				updatePrintValues();
			} catch (e) {
				console.error('Error loading from localStorage', e);
				completedTasks = {};
				buildChecklist();
				updatePrintValues();
			}
		});
	</script>
</body>

</html>
