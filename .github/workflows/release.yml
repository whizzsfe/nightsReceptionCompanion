name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Read version from package.json
        id: pkg
        run: |
          $version = node -p "require('./package.json').version"
          $prerelease = node -p "require('./package.json').version.includes('-') ? 'true' : 'false'"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "prerelease=$prerelease" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: Night Receptionist Companion v${{ steps.pkg.outputs.version }}
          draft: false
          prerelease: ${{ steps.pkg.outputs.prerelease }}
          files: dist/*.exe
