name: CI — Test Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prebuild (populate app/)
        run: node scripts/prebuild.js

      - name: Test build (unpacked — no installer)
        run: npm run build:dir
        env:
          # electron-builder uses this to skip code signing on CI
          CSC_IDENTITY_AUTO_DISCOVERY: false
